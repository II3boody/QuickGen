<body>

    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true" dir="rtl">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-modal-bg">

                <div class="modal-header border-0 d-flex justify-content-between align-items-start pb-0">
                    <button type="button" class="btn-close btn-close-white m-0" data-bs-dismiss="modal"
                        aria-label="Close"></button>

                    <div class="d-flex align-items-center">
                        <h5 class="modal-title text-white fw-bold me-3" style="font-size: 1.4rem;">تأكيد الحذف</h5>
                        <div class="icon-box">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                        </div>
                    </div>
                </div>

                <div class="modal-body text-end pt-4 pb-4">
                    <p class="text-white mb-1" style="font-size: 1.2rem;">هل أنت متأكد من حذف <span
                            class="fw-bold">الدرس:</span></p>
                    <h5 class="lesson-name mt-2">"اسم الدرس"</h5>
                </div>

                <div class="modal-footer border-0 d-flex gap-3">
                    <button type="button" class="btn btn-delete flex-grow-1">حذف نهائياً</button>
                    <button type="button" class="btn btn-cancel flex-grow-1" data-bs-dismiss="modal">إلغاء</button>
                </div>

            </div>
        </div>
    </div>
