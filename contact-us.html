<!DOCTYPE html>
<html>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickGen</title>

    <link rel="stylesheet" href="./node_modules/@fortawesome/fontawesome-free/css/all.min.css">

    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.rtl.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
      <!-- SignUp -->
     <div class="contact-container">
    <div class="contact-form">
        <div class="form-row">
            <div class="form-group">
                <label>الاسم</label>
                <input type="text" placeholder="أدخل اسمك">
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" placeholder="أدخل بريدك الإلكتروني">
            </div>
        </div>

        <div class="form-group">
            <label>الموضوع</label>
            <input type="text" placeholder="موضوع الرسالة">
        </div>

        <div class="form-group">
            <label>الرسالة</label>
            <textarea rows="5" placeholder="اكتب رسالتك هنا..."></textarea>
        </div>

        <button class="send-btn">
            إرسال الرسالة <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <div class="contact-info">
        <div class="info-card">
            <div class="info-text">
                <h3>البريد الإلكتروني</h3>
                <p>info@ailearning.com</p>
            </div>
         <div class="info-icon purple"> <i class="fa-solid fa-envelope text-white"></i></div>
        
        </div>

        <div class="info-card">
            <div class="info-text">
                <h3>الهاتف</h3>
                <p dir="ltr">+966 50 123 4567</p>
            </div>
            <div class="info-icon blue"><i class="fas fa-phone-alt text-white"></i></div>
        </div>

        <div class="info-card">
            <div class="info-text">
                <h3>ساعات العمل</h3>
                <p>السبت - الخميس: 9ص - 6م</p>
            </div>
            <div class="info-icon orange"><i class="fas fa-clock text-white"></i></div>
        </div>
    </div>
</div>
    <script src="./node_modules/jquery/dist/jquery.min.js"></script>

    <script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/main.js"></script>

</body>
</html>
